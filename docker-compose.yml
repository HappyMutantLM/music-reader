services:
  music-server:
    image: python:3.12-slim
    container_name: music-server
    restart: unless-stopped
    ports:
      - "8000:8000"          # FastAPI — change left side if 8000 is taken
    volumes:
      - /volume1/docker/music-server/app:/app
      - /volume1/docker/music-server/db:/db
      - /volume1/docker/music-server/pdf:/pdf
      - /volume1/docker/music-server/cache:/cache
      - /volume1/docker/music-server/logs:/logs
    environment:
      - PDF_DIR=/pdf
      # CACHE_DIR: rendered page PNGs (routers/pages.py), keyed by
      # {score_id}/{page_number}.png — avoids re-rendering with PyMuPDF
      # on every pedal tap.
      - CACHE_DIR=/cache
      - DB_PATH=/db/music.db
      - LOG_DIR=/logs
      - ALLOWED_ORIGINS=http://localhost:5173,http://memoryalpha:8000
    working_dir: /app
    command: >
      sh -c "pip install -q -r requirements.txt &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

# command: >. ##### replace above command with this once in prod
#      sh -c "pip install -q -r requirements.txt &&
#             uvicorn main:app --host 0.0.0.0 --port 8000"

  dropbox-processor:
    image: python:3.12-slim
    container_name: music-dropbox-processor
    restart: unless-stopped
    # Separate container from music-server on purpose: a crash/restart
    # here (e.g. a malformed PDF) doesn't take down the API, and an API
    # restart doesn't interrupt anything mid-move in the dropbox.
    volumes:
      - /volume1/docker/music-server/app:/app
      - /volume1/docker/music-server/pdf:/pdf
      - /volume1/docker/music-server/dropbox:/dropbox
      - /volume1/docker/music-server/logs:/logs
    environment:
      - PDF_DIR=/pdf
      - DROPBOX_DIR=/dropbox
      - LOG_DIR=/logs
    working_dir: /app
    command: >
      sh -c "pip install -q -r requirements.txt &&
             python dropbox_processor.py"